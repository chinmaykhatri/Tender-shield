# ============================================================================
# TenderShield — VPS All-in-One Deployment (Multi-Org)
# ============================================================================
# Runs everything on a single VPS with 2-ORG CONSENSUS:
#   - Next.js frontend (port 3000)
#   - Hyperledger Fabric: 2 peers (Ministry + NIC), orderer, 2×CouchDB
#   - Endorsement: AND('MinistryOrgMSP.peer', 'NICOrgMSP.peer')
#
# Start:   docker compose -f docker-compose.vps.yml up -d --build
# Status:  docker compose -f docker-compose.vps.yml ps
# Logs:    docker compose -f docker-compose.vps.yml logs -f frontend
# Stop:    docker compose -f docker-compose.vps.yml down
# ============================================================================

volumes:
  orderer.tendershield.gov.in:
  peer0.ministry.tendershield.gov.in:
  peer0.nic.tendershield.gov.in:
  couchdb0:
  couchdb1:

networks:
  tendershield:
    name: tendershield_fabric

services:
  # ═══════════════════════════════════════════
  # Fabric Infrastructure — MinistryOrg
  # ═══════════════════════════════════════════

  couchdb0:
    container_name: couchdb0.tendershield
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    volumes:
      - couchdb0:/opt/couchdb/data
    networks:
      - tendershield
    restart: unless-stopped

  orderer.tendershield.gov.in:
    container_name: orderer.tendershield.gov.in
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
    working_dir: /root
    command: orderer
    volumes:
      - ./fabric-crypto/ordererOrganizations/tendershield.gov.in/orderers/orderer.tendershield.gov.in/msp:/var/hyperledger/orderer/msp
      - ./fabric-crypto/ordererOrganizations/tendershield.gov.in/orderers/orderer.tendershield.gov.in/tls:/var/hyperledger/orderer/tls
      - ./fabric-config/channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - orderer.tendershield.gov.in:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
    networks:
      - tendershield
    restart: unless-stopped

  peer0.ministry.tendershield.gov.in:
    container_name: peer0.ministry.tendershield.gov.in
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.ministry.tendershield.gov.in
      - CORE_PEER_ADDRESS=peer0.ministry.tendershield.gov.in:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.ministry.tendershield.gov.in:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.ministry.tendershield.gov.in:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.ministry.tendershield.gov.in:7051
      - CORE_PEER_LOCALMSPID=MinistryOrgMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0.tendershield:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=tendershield_fabric
    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./fabric-crypto/peerOrganizations/ministry.tendershield.gov.in/peers/peer0.ministry.tendershield.gov.in/msp:/etc/hyperledger/fabric/msp
      - ./fabric-crypto/peerOrganizations/ministry.tendershield.gov.in/peers/peer0.ministry.tendershield.gov.in/tls:/etc/hyperledger/fabric/tls
      - peer0.ministry.tendershield.gov.in:/var/hyperledger/production
    ports:
      - "7051:7051"
    depends_on:
      - couchdb0
      - orderer.tendershield.gov.in
    networks:
      - tendershield
    restart: unless-stopped

  # CLI for MinistryOrg operations
  cli.tendershield:
    container_name: cli.tendershield
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.ministry.tendershield.gov.in:7051
      - CORE_PEER_LOCALMSPID=MinistryOrgMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/crypto/peerOrganizations/ministry.tendershield.gov.in/peers/peer0.ministry.tendershield.gov.in/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/crypto/peerOrganizations/ministry.tendershield.gov.in/peers/peer0.ministry.tendershield.gov.in/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/crypto/peerOrganizations/ministry.tendershield.gov.in/peers/peer0.ministry.tendershield.gov.in/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/crypto/peerOrganizations/ministry.tendershield.gov.in/users/Admin@ministry.tendershield.gov.in/msp
    working_dir: /opt/gopath/src/github.com/chaincode
    command: /bin/bash
    volumes:
      - ./chaincode:/opt/gopath/src/github.com/chaincode
      - ./fabric-crypto:/opt/gopath/src/github.com/crypto
      - ./fabric-config:/opt/gopath/src/github.com/config
      - ./fabric-config/channel-artifacts:/opt/gopath/src/github.com/channel-artifacts
    depends_on:
      - peer0.ministry.tendershield.gov.in
    networks:
      - tendershield

  # ═══════════════════════════════════════════
  # Fabric Infrastructure — NICOrg (2nd Org)
  # ═══════════════════════════════════════════

  couchdb1:
    container_name: couchdb1.tendershield
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "6984:5984"
    volumes:
      - couchdb1:/opt/couchdb/data
    networks:
      - tendershield
    restart: unless-stopped

  peer0.nic.tendershield.gov.in:
    container_name: peer0.nic.tendershield.gov.in
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.nic.tendershield.gov.in
      - CORE_PEER_ADDRESS=peer0.nic.tendershield.gov.in:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.nic.tendershield.gov.in:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.ministry.tendershield.gov.in:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.nic.tendershield.gov.in:8051
      - CORE_PEER_LOCALMSPID=NICOrgMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1.tendershield:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=tendershield_fabric
    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./fabric-crypto/peerOrganizations/nic.tendershield.gov.in/peers/peer0.nic.tendershield.gov.in/msp:/etc/hyperledger/fabric/msp
      - ./fabric-crypto/peerOrganizations/nic.tendershield.gov.in/peers/peer0.nic.tendershield.gov.in/tls:/etc/hyperledger/fabric/tls
      - peer0.nic.tendershield.gov.in:/var/hyperledger/production
    ports:
      - "8051:8051"
    depends_on:
      - couchdb1
      - orderer.tendershield.gov.in
    networks:
      - tendershield
    restart: unless-stopped

  # CLI for NICOrg operations (needed for 2-org chaincode approval)
  cli.nic:
    container_name: cli.nic.tendershield
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli.nic
      - CORE_PEER_ADDRESS=peer0.nic.tendershield.gov.in:8051
      - CORE_PEER_LOCALMSPID=NICOrgMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/crypto/peerOrganizations/nic.tendershield.gov.in/peers/peer0.nic.tendershield.gov.in/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/crypto/peerOrganizations/nic.tendershield.gov.in/peers/peer0.nic.tendershield.gov.in/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/crypto/peerOrganizations/nic.tendershield.gov.in/peers/peer0.nic.tendershield.gov.in/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/crypto/peerOrganizations/nic.tendershield.gov.in/users/Admin@nic.tendershield.gov.in/msp
    working_dir: /opt/gopath/src/github.com/chaincode
    command: /bin/bash
    volumes:
      - ./chaincode:/opt/gopath/src/github.com/chaincode
      - ./fabric-crypto:/opt/gopath/src/github.com/crypto
      - ./fabric-config:/opt/gopath/src/github.com/config
      - ./fabric-config/channel-artifacts:/opt/gopath/src/github.com/channel-artifacts
    depends_on:
      - peer0.nic.tendershield.gov.in
    networks:
      - tendershield

  # ═══════════════════════════════════════════
  # Frontend (Next.js)
  # ═══════════════════════════════════════════

  frontend:
    container_name: tendershield-app
    build:
      context: .
      dockerfile: Dockerfile.frontend
    env_file:
      - .env.production.local
    environment:
      - NODE_ENV=production
      - FABRIC_MODE=DOCKER
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3000:3000"
    depends_on:
      - peer0.ministry.tendershield.gov.in
      - peer0.nic.tendershield.gov.in
    networks:
      - tendershield
    restart: unless-stopped
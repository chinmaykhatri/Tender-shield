# TenderShield Alembic Configuration
# Database migration management

[alembic]
# Path to migration scripts
script_location = backend/migrations

# Template for migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# SQLAlchemy URL — overridden at runtime from env
sqlalchemy.url = sqlite:///./tendershield_dev.db

# Timezone for timestamps in migration files
timezone = Asia/Kolkata

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

name: TenderShield CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ==========================================
  # Backend — Python Tests & Linting
  # ==========================================
  backend-tests:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx flake8 mypy

      - name: Lint with flake8
        run: |
          flake8 backend/ ai_engine/ --max-line-length=120 --count --statistics

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --cov=ai_engine --cov=backend --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          flags: backend

  # ==========================================
  # Frontend — Next.js Build & Tests
  # ==========================================
  frontend-tests:
    name: Frontend Build & Tests (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-key' }}

      - name: Run tests
        run: npm test -- --passWithNoTests

  # ==========================================
  # Security Scan
  # ==========================================
  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python security scan
        uses: pyupio/safety@v3
        continue-on-error: true
        with:
          scan: "requirements.txt"

      - name: Node.js audit
        run: npm audit --production --audit-level=high
        continue-on-error: true

  # ==========================================
  # Docker Build Validation
  # ==========================================
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t tendershield-frontend:test .

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t tendershield-backend:test ./backend

      - name: Build AI engine image
        run: docker build -f ai_engine/Dockerfile -t tendershield-ai:test ./ai_engine

name: TenderShield CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key"
  NEXT_PUBLIC_DEMO_MODE: "true"

jobs:
  # ==========================================
  # Backend — Python Tests
  # ==========================================
  backend-tests:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --cov=ai_engine --cov-report=term-missing || true
        env:
          PYTHONPATH: ${{ github.workspace }}

  # ==========================================
  # Frontend — Next.js Build
  # ==========================================
  frontend-tests:
    name: Frontend Build & Tests (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Run tests
        run: npm test -- --passWithNoTests 2>/dev/null || true

  # ==========================================
  # Security Scan
  # ==========================================
  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Node.js audit
        run: npm audit --production --audit-level=critical 2>/dev/null || true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python dependency check
        run: |
          pip install pip-audit
          pip install -r requirements-ci.txt
          pip-audit || true

  # ==========================================
  # Docker Build Validation
  # ==========================================
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t tendershield-frontend:test .

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t tendershield-backend:test ./backend

      - name: Build AI engine image
        run: docker build -f ai_engine/Dockerfile -t tendershield-ai:test ./ai_engine

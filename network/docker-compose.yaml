  # ===========================================================================
  # CLI — Fabric Peer CLI for administration and chaincode operations
  # ===========================================================================
  cli:
    container_name: cli.tendershield
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.ministry.tendershield.gov.in:7051
      - CORE_PEER_LOCALMSPID=MinistryOrgMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/ministry.tendershield.gov.in/peers/peer0.ministry.tendershield.gov.in/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/ministry.tendershield.gov.in/peers/peer0.ministry.tendershield.gov.in/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/ministry.tendershield.gov.in/peers/peer0.ministry.tendershield.gov.in/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/ministry.tendershield.gov.in/users/Admin@ministry.tendershield.gov.in/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../chaincode/:/opt/gopath/src/github.com/chaincode
      - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/
      - ./scripts:/opt/gopath/src/github.com/hyperledger/fabric/peer/scripts/
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
    depends_on:
      - orderer0.orderer.tendershield.gov.in
      - orderer1.orderer.tendershield.gov.in
      - orderer2.orderer.tendershield.gov.in
      - peer0.ministry.tendershield.gov.in
      - peer0.bidder.tendershield.gov.in
      - peer0.auditor.tendershield.gov.in
      - peer0.nic.tendershield.gov.in
    networks:
      - tendershield_network

  # ===========================================================================
  # MONITORING — Prometheus + Grafana for operational visibility
  # ===========================================================================

  prometheus:
    container_name: prometheus.tendershield
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - tendershield_network

  grafana:
    container_name: grafana.tendershield
    image: grafana/grafana:10.1.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - tendershield_network
